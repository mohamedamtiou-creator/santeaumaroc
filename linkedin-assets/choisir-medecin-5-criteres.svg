<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eaf1fb"/>
    </linearGradient>
    <linearGradient id="brandbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="card" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1e3a8a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="14" fill="url(#brandbar)"/>

  <!-- Brand lockup : vraie icône "Onde" + wordmark charte -->
  <g transform="translate(80,80)">
    <!-- LogoMark : carré arrondi dégradé + monogramme S·M blanc (viewBox 120, scale 0.5) -->
    <g transform="scale(0.5)">
      <rect width="120" height="120" rx="28" fill="url(#mark)"/>
      <path d="M30 88 L30 40 C45 40 51 53 60 61 C69 69 75 80 90 80" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M90 80 L90 40 C75 40 69 53 60 61" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Wordmark : Inter extra-bold, tracking serré, "au" en vert -->
    <text x="76" y="42" font-size="34" font-weight="800" letter-spacing="-1" dominant-baseline="middle"><tspan fill="#2563eb">Santé</tspan><tspan fill="#059669">au</tspan><tspan fill="#2563eb">Maroc</tspan></text>
  </g>

  <!-- Title -->
  <g transform="translate(80,240)">
    <text font-size="60" font-weight="800" letter-spacing="-1.5" fill="#0f172a">
      <tspan x="0" y="0">Comment choisir</tspan>
      <tspan x="0" y="72">son médecin au Maroc</tspan>
    </text>
    <rect x="4" y="104" width="120" height="8" rx="4" fill="#059669"/>
    <text x="0" y="162" font-size="30" font-weight="600" fill="#2563eb">Les 5 critères à croiser avant de réserver</text>
  </g>

  <!-- Checklist card -->
  <g transform="translate(80,470)" filter="url(#card)">
    <rect width="920" height="490" rx="28" fill="#ffffff"/>
  </g>

  <!-- Rows -->
  <g transform="translate(120,510)" font-size="30" fill="#0f172a" font-weight="600">
    <!-- 1 Spécialité -->
    <g transform="translate(0,0)">
      <rect width="56" height="56" rx="14" fill="#eff6ff"/>
      <g transform="translate(15,15)" stroke="#2563eb" stroke-width="3.2" fill="none" stroke-linecap="round">
        <circle cx="11" cy="11" r="9"/>
        <path d="M18 18 l7 7"/>
      </g>
      <text x="82" y="38">Spécialité adaptée à votre besoin</text>
    </g>
    <!-- 2 Proximité -->
    <g transform="translate(0,88)">
      <rect width="56" height="56" rx="14" fill="#ecfdf5"/>
      <g transform="translate(16,13)" stroke="#059669" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2 C6 2 2 6 2 12 C2 19 12 30 12 30 C12 30 22 19 22 12 C22 6 18 2 12 2 Z"/>
        <circle cx="12" cy="12" r="4"/>
      </g>
      <text x="82" y="38">Proximité du cabinet</text>
    </g>
    <!-- 3 Avis -->
    <g transform="translate(0,176)">
      <rect width="56" height="56" rx="14" fill="#fffbeb"/>
      <path transform="translate(11,12)" d="M17 1 l4.9 9.9 11 1.6 -8 7.8 1.9 10.9 -9.8 -5.2 -9.8 5.2 1.9 -10.9 -8 -7.8 11 -1.6 Z" fill="#f59e0b"/>
      <text x="82" y="38">Avis des autres patients</text>
    </g>
    <!-- 4 Tarif + AMO -->
    <g transform="translate(0,264)">
      <rect width="56" height="56" rx="14" fill="#eff6ff"/>
      <g transform="translate(13,17)" stroke="#2563eb" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="1" width="28" height="21" rx="4"/>
        <path d="M1 8 h28"/>
      </g>
      <text x="82" y="38">Tarif et couverture AMO</text>
    </g>
    <!-- 5 Délai -->
    <g transform="translate(0,352)">
      <rect width="56" height="56" rx="14" fill="#ecfdf5"/>
      <g transform="translate(14,13)" stroke="#059669" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="26" height="24" rx="4"/>
        <path d="M1 10 h26 M8 1 v5 M20 1 v5"/>
      </g>
      <text x="82" y="38">Délai de rendez-vous</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(80,1012)">
    <text font-size="26" font-weight="700" fill="#2563eb">santeaumaroc.com</text>
    <text x="920" y="0" text-anchor="end" font-size="24" fill="#64748b">Guide complet sur le blog</text>
  </g>
</svg>
